<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Очки стримера — 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f7f6f3;
            --bg2: #eeede9;
            --bg3: #e3e2dd;
            --text: #1c1b18;
            --text2: #57564f;
            --text3: #9a9890;
            --border: rgba(0, 0, 0, .10);
            --border2: rgba(0, 0, 0, .18);
            --accent: #2F7ED8;
            --r: 8px;
            --rl: 12px;
            --bar-ghost: rgba(120, 118, 110, .18);
            --bar-ghost-border: rgba(120, 118, 110, .28);
        }

        [data-theme=dark] {
            --bg: #18181b;
            --bg2: #232327;
            --bg3: #2c2c31;
            --text: #f0efeb;
            --text2: #9a9890;
            --text3: #5a5852;
            --border: rgba(255, 255, 255, .09);
            --border2: rgba(255, 255, 255, .18);
            --bar-ghost: rgba(255, 255, 255, .07);
            --bar-ghost-border: rgba(255, 255, 255, .13);
        }

        html,
        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background .2s, color .2s;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            border-bottom: .5px solid var(--border);
            flex-wrap: wrap;
        }

        .hdr-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: .01em;
            flex: 1;
            min-width: 120px;
        }

        .hdr-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .seg {
            display: flex;
            border: .5px solid var(--border2);
            border-radius: var(--r);
            overflow: hidden;
            background: var(--bg2);
        }

        .seg button {
            padding: 6px 11px;
            font-size: 11.5px;
            font-weight: 600;
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            transition: background .15s, color .15s;
            white-space: nowrap;
            line-height: 1.3;
        }

        .seg button.active {
            background: var(--accent);
            color: #fff;
        }

        .seg button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
        }

        .tog {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text2);
            cursor: pointer;
            user-select: none;
        }

        .tog input {
            display: none;
        }

        .tog .pill {
            width: 34px;
            height: 19px;
            border-radius: 10px;
            background: var(--bg3);
            border: .5px solid var(--border2);
            position: relative;
            transition: background .2s;
        }

        .tog input:checked+.pill {
            background: var(--accent);
        }

        .tog .pill::after {
            content: '';
            position: absolute;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #fff;
            top: 2px;
            left: 2px;
            transition: left .2s;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .22);
        }

        .tog input:checked+.pill::after {
            left: 19px;
        }

        main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .sidebar {
            width: 240px;
            min-width: 200px;
            border-right: .5px solid var(--border);
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #wrap {
            flex: 1;
            position: relative;
            min-height: 420px;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
            touch-action: none;
        }

        canvas:active {
            cursor: grabbing;
        }

        .clabel {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 5px;
        }

        .slider-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-val {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .slider-desc {
            font-size: 11px;
            color: var(--text3);
            line-height: 1.4;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        #gradBar {
            height: 10px;
            border-radius: 5px;
            width: 100%;
        }

        .grad-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text3);
            margin-top: 3px;
        }

        .hint {
            font-size: 11px;
            color: var(--text3);
            line-height: 1.6;
        }

        #tt {
            position: absolute;
            pointer-events: none;
            display: none;
            background: var(--bg);
            border: .5px solid var(--border2);
            border-radius: var(--rl);
            padding: 11px 13px;
            font-size: 12px;
            color: var(--text);
            line-height: 1.75;
            max-width: 240px;
            z-index: 20;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .13);
        }

        #tt.pinned {
            pointer-events: all;
        }

        .tt-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .tt-title {
            font-size: 13px;
            font-weight: 700;
        }

        .tt-close {
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 0 2px;
        }

        .tt-close:hover {
            color: var(--text);
        }

        .tt-row {
            color: var(--text2);
        }

        .tt-row b {
            color: var(--text);
            font-weight: 600;
        }

        .tt-total {
            margin-top: 5px;
            padding-top: 5px;
            border-top: .5px solid var(--border);
            font-weight: 700;
            font-size: 13px;
        }

        .tt-max {
            font-size: 11px;
            color: #BA7517;
            margin-top: 1px;
        }

        .tt-sep {
            margin-top: 7px;
            padding-top: 6px;
            border-top: .5px solid var(--border);
            font-size: 11px;
            color: var(--text3);
        }

        .tt-game a {
            font-size: 12px;
            color: var(--accent);
            text-decoration: none;
        }

        .tt-game a:hover {
            text-decoration: underline;
        }

        .tt-game-meta {
            font-size: 11px;
            color: var(--text3);
        }

        .tt-nogame {
            font-size: 12px;
            color: var(--text3);
            font-style: italic;
        }

        .tt-ghost {
            font-size: 11px;
            color: var(--text3);
            font-style: italic;
            margin-top: 3px;
        }
    </style>
</head>

    <header>
        <span class="hdr-title">Очки стримера — 3D-визуализация</span>
        <div class="hdr-right">
            <div class="seg" id="axisToggle">
                <button class="active" data-axis="rating">Год × Время · Рейтинг</button>

    </header>
    <main>
        <aside class="sidebar">
            <div id="sliderSection">

                <div class="slider-row">

            </div>
            <div>
                <div class="clabel">Цвет = очки/ч</div>
                <div id="gradBar"></div>
                <div class="grad-labels" id="gradLabels"></div>
            </div>
            <div>
                <div class="clabel">Обозначения</div>
                <div class="hint">
                    ▲ Пирамида — локальный максимум (5,10,15…ч)<br>
                    Прозрачный — нет игры в базе<br><br>
                    Перетащите для вращения<br>
                    Колёсико — масштаб<br>
                    Клик — зафиксировать подсказку
                </div>
            </div>
        </aside>
        <div class="canvas-area">
            <div id="wrap">
                <canvas id="c3d"></canvas>
                <div id="tt">
                    <div class="tt-head">
                        <span class="tt-title" id="ttTitle"></span>
                        <button class="tt-close" id="ttClose" style="display:none">✕</button>
                    </div>
                    <div id="ttBody"></div>
                </div>
            </div>
        </div>
    </main>

// ── SCORING ───────────────────────────────────────────────────
const HLTB_RANGES=[[1,5],[6,10],[11,15],[16,20],[21,25],[26,30]];
const HLTB_LABELS=['1–5','6–10','11–15','16–20','21–25','26–30'];
const YEARS=Array.from({length:32},(_,i)=>1995+i);
const HOURS=Array.from({length:30},(_,i)=>i+1);
const RBUCKETS=['90–100%','81–89%','76–80%','71–75%','61–70%','51–60%','45–50%','≤44%'];
const RBUCKET_BONUS=[1,2,3,4,5,6,7,10];

function getRate(h){const c=((h-0.001)%20);if(c<5)return 3;if(c<10)return 4;if(c<15)return 5;return 6;}
function freshnessBonus(y){if(y>=2024)return 1;if(y>=2020)return 2;if(y>=2016)return 3;if(y>=2010)return 4;if(y>=2006)return 5;if(y>=2001)return 7;return 10;}
function ratingBonusFromPct(v){if(v>=90)return 1;if(v>=81)return 2;if(v>=76)return 3;if(v>=71)return 4;if(v>=61)return 5;if(v>=51)return 6;if(v>=45)return 7;return 10;}
function ratingBucket(v){if(v>=90)return 0;if(v>=81)return 1;if(v>=76)return 2;if(v>=71)return 3;if(v>=61)return 4;if(v>=51)return 5;if(v>=45)return 6;return 7;}
function ratingLabel(v){return RBUCKETS[ratingBucket(v)];}

let axisMode='rating', sliderVal=75;

function getAxes(){
  if(axisMode==='rating') return{
    xArr:HOURS,xLabel:'Время прохождения (ч)',zArr:YEARS,zLabel:'Год выхода',
    xTick:(h,i)=>h%5===0?h+'ч':'', zTick:(y,i)=>y%5===0?String(y):'',
    score:(xi,zi)=>getRate(HOURS[xi])+freshnessBonus(YEARS[zi])+ratingBonusFromPct(sliderVal),
    hasGame:(xi,zi)=>!!EXISTS_YEAR_HB_RB[YEARS[zi]+'_'+Math.floor(xi/5)+'_'+ratingBucket(sliderVal)],
    getGame:(xi,zi)=>GAME_LOOKUP[YEARS[zi]+'_'+Math.floor(xi/5)+'_'+ratingBucket(sliderVal)],
    ttLine1:(xi,zi)=>HOURS[xi]+'ч · '+YEARS[zi],
    rate:(xi)=>getRate(HOURS[xi]),
    fresh:(xi,zi)=>freshnessBonus(YEARS[zi]),
    rBonus:()=>ratingBonusFromPct(sliderVal),
    rLbl:()=>ratingLabel(sliderVal),
  };
  if(axisMode==='year') return{
    xArr:HOURS,xLabel:'Время прохождения (ч)',zArr:RBUCKETS,zLabel:'Рейтинг HLTB',
    xTick:(h,i)=>h%5===0?h+'ч':'', zTick:(r,i)=>r,
    score:(xi,zi)=>getRate(HOURS[xi])+freshnessBonus(sliderVal)+RBUCKET_BONUS[zi],
    hasGame:(xi,zi)=>!!EXISTS_YEAR_HB_RB[sliderVal+'_'+Math.floor(xi/5)+'_'+zi],
    getGame:(xi,zi)=>GAME_LOOKUP[sliderVal+'_'+Math.floor(xi/5)+'_'+zi],
    ttLine1:(xi,zi)=>HOURS[xi]+'ч · '+RBUCKETS[zi],
    rate:(xi)=>getRate(HOURS[xi]),
    fresh:(xi,zi)=>freshnessBonus(sliderVal),
    rBonus:(xi,zi)=>RBUCKET_BONUS[zi],
    rLbl:(xi,zi)=>RBUCKETS[zi],
  };
  // hltb mode
  return{
    xArr:HLTB_LABELS,xLabel:'HLTB Main Story (ч)',zArr:YEARS,zLabel:'Год выхода',
    xTick:(l,i)=>l, zTick:(y,i)=>y%5===0?String(y):'',
    score:(xi,zi)=>getRate((HLTB_RANGES[xi][0]+HLTB_RANGES[xi][1])/2)+freshnessBonus(YEARS[zi])+ratingBonusFromPct(sliderVal),
    hasGame:(xi,zi)=>!!EXISTS_YEAR_HB_RB[YEARS[zi]+'_'+xi+'_'+ratingBucket(sliderVal)],
    getGame:(xi,zi)=>GAME_LOOKUP[YEARS[zi]+'_'+xi+'_'+ratingBucket(sliderVal)],
    ttLine1:(xi,zi)=>'HLTB '+HLTB_LABELS[xi]+'ч · '+YEARS[zi],

    rate:(xi)=>getRate((HLTB_RANGES[xi][0]+HLTB_RANGES[xi][1])/2),
    fresh:(xi,zi)=>freshnessBonus(YEARS[zi]),
    rBonus:()=>ratingBonusFromPct(sliderVal),
    rLbl:()=>ratingLabel(sliderVal),
  };
}

function isLocalMaxX(xi,xArr){
  if(axisMode==='hltb')return true;
  const h=xArr[xi];
  return h===5||h===10||h===15||h===20||h===25||h===30;
}

// ── THREE.JS ──────────────────────────────────────────────────
const wrap=document.getElementById('wrap');
const canvasEl=document.getElementById('c3d');
let W=wrap.clientWidth||800, H=wrap.clientHeight||500;

const renderer=new THREE.WebGLRenderer({canvas:canvasEl,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0,0);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,W/H,0.1,2000);
camera.position.set(32,26,44); camera.lookAt(0,3,0);

scene.add(new THREE.AmbientLight(0xffffff,0.88));
const dl=new THREE.DirectionalLight(0xffffff,0.48); dl.position.set(20,40,20); scene.add(dl);
const dl2=new THREE.DirectionalLight(0xffffff,0.22); dl2.position.set(-15,20,-10); scene.add(dl2);

const pivot=new THREE.Group(); scene.add(pivot);
let rotY=-0.45, rotX=0.28, scl=1;
pivot.rotation.y=rotY; pivot.rotation.x=rotX;

const MAX_S=22, Y_SCALE=9, BW=0.42;
let barMeshes=[], pyramidMeshes=[], axisGrp=null, selectedOutline=null;

function scoreToColor(s,mn,mx){
  const c=new THREE.Color(); c.setHSL((1-(s-mn)/(mx-mn||1))*0.667,0.85,0.52); return c;
}
function ghostColor(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  return isDark ? new THREE.Color(0.22,0.22,0.24) : new THREE.Color(0.78,0.77,0.74);
}

function getSX(xLen){ return xLen<=8 ? 0.78 : 0.58; }
function getSZ(zLen){ return zLen<=10 ? 0.76 : 0.52; }

function buildBars(){
  barMeshes.forEach(m=>pivot.remove(m)); pyramidMeshes.forEach(m=>pivot.remove(m));
  if(axisGrp) pivot.remove(axisGrp);
  barMeshes=[]; pyramidMeshes=[];

  const ax=getAxes();
  const xArr=ax.xArr, zArr=ax.zArr;
  const SX=getSX(xArr.length), SZ=getSZ(zArr.length);

  let mn=999,mx=0;
  xArr.forEach((_,xi)=>zArr.forEach((_,zi)=>{const s=ax.score(xi,zi);if(s<mn)mn=s;if(s>mx)mx=s;}));

  xArr.forEach((xv,xi)=>{
    zArr.forEach((zv,zi)=>{
      const s=ax.score(xi,zi);
      const has=ax.hasGame(xi,zi);
      const ht=(s/MAX_S)*Y_SCALE+0.08;
      const x=(xi-(xArr.length-1)/2)*SX;
      const z=(zi-(zArr.length-1)/2)*SZ;

      let col, opacity, transparent;
      if(has){
        col=scoreToColor(s,mn,mx); opacity=1; transparent=false;
      } else {
        col=ghostColor(); opacity=0.28; transparent=true;
      }

      const geo=new THREE.BoxGeometry(BW,ht,BW);
      const mat=new THREE.MeshLambertMaterial({color:col,transparent,opacity});
      const mesh=new THREE.Mesh(geo,mat);
      mesh.position.set(x,ht/2,z);
      mesh.userData={xi,zi,s,ht,x,z,xv,zv,has,
        rate:ax.rate(xi),
        fresh:ax.fresh(xi,zi),
        rBonus:typeof ax.rBonus==='function'?ax.rBonus(xi,zi):ax.rBonus(),
        rLbl:typeof ax.rLbl==='function'?ax.rLbl(xi,zi):ax.rLbl(),
        ttLine1:ax.ttLine1(xi,zi),
      };
      pivot.add(mesh); barMeshes.push(mesh);

      if(isLocalMaxX(xi,xArr) && has){
        const pb=BW/2+0.01, ph=pb*1.6;
        const pg=new THREE.ConeGeometry(pb*Math.sqrt(2),ph,4);
        const pymesh=new THREE.Mesh(pg,new THREE.MeshLambertMaterial({color:col}));
        pymesh.rotation.y=Math.PI/4;
        pymesh.position.set(x,ht+ph/2,z);
        pymesh.userData=mesh.userData;
        pivot.add(pymesh); pyramidMeshes.push(pymesh);
      }
    });
  });

  buildAxis(ax,mn,mx);
  updateGradBar(mn,mx);
}

// ── SPRITES ───────────────────────────────────────────────────
const spriteCache={};
function makeSprite(text,size){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const key=text+'_'+size+'_'+isDark;
  if(spriteCache[key]) return spriteCache[key].clone();
  const c2=document.createElement('canvas'); c2.width=512; c2.height=100;
  const ctx=c2.getContext('2d'); ctx.clearRect(0,0,512,100);
  ctx.fillStyle=isDark?'#d4d2ca':'#666460';
  ctx.font=`700 ${Math.round(size*52)}px -apple-system,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,256,50);
  const tex=new THREE.CanvasTexture(c2);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true});
  const sp=new THREE.Sprite(mat);
  sp.scale.set(size*9,size*1.9,1);
  return sp;
}

function buildAxis(ax,mn,mx){
  const ag=new THREE.Group();
  const xArr=ax.xArr, zArr=ax.zArr;
  const SX=getSX(xArr.length), SZ=getSZ(zArr.length);
  const axMat=new THREE.LineBasicMaterial({color:0x888780,transparent:true,opacity:0.28});
  function axLine(x1,y1,z1,x2,y2,z2){
    const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x1,y1,z1),new THREE.Vector3(x2,y2,z2)]);
    return new THREE.Line(g,axMat);
  }

  const xMin=(0-(xArr.length-1)/2)*SX-0.6, xMax=(xArr.length-1-(xArr.length-1)/2)*SX+0.6;
  const zMin=(0-(zArr.length-1)/2)*SZ-0.5, zMax=(zArr.length-1-(zArr.length-1)/2)*SZ+0.5;

  ag.add(axLine(xMin,0,zMax,xMax,0,zMax));
  ag.add(axLine(xMin,0,zMax,xMin,13,zMax));
  ag.add(axLine(xMin,0,zMin,xMin,0,zMax));

  // X ticks
  xArr.forEach((xv,xi)=>{
    const lbl=ax.xTick(xv,xi); if(!lbl) return;
    const x=(xi-(xArr.length-1)/2)*SX;
    const sp=makeSprite(lbl,0.88); sp.position.set(x,-1.9,zMax+2.2); ag.add(sp);
    ag.add(axLine(x,0,zMax,x,-0.35,zMax));
  });
  // Z ticks
  zArr.forEach((zv,zi)=>{
    const lbl=ax.zTick(zv,zi); if(!lbl) return;
    const z=(zi-(zArr.length-1)/2)*SZ;
    const sp=makeSprite(lbl,0.82); sp.position.set(xMin-4.0,-0.5,z); ag.add(sp);
  });
  // Y ticks
  [4,8,12,16,20].forEach(v=>{
    const yp=(v/MAX_S)*Y_SCALE;
    const sp=makeSprite(String(v),0.72); sp.position.set(xMin-3.2,yp,zMax+0.4); ag.add(sp);
    ag.add(axLine(xMin,yp,zMax,xMin-0.55,yp,zMax));
  });

  // Axis labels — positioned safely outside the data
  // X-axis label — always centred under x axis
  const lbX=makeSprite(ax.xLabel,1.08); lbX.position.set(0,-3.4,zMax+3.2); ag.add(lbX);
  // Z-axis label — placed at Z midpoint; x position matches xMin offset
  // Extend visual length to match X axis width when Z is short
  const xAxisLen=xMax-xMin;
  const zAxisLen=zMax-zMin;
  const zLblScale=axisMode==='rating'?1.04:Math.max(1.04, 1.04*(xAxisLen/Math.max(zAxisLen,1)));
  const lbZ=makeSprite(ax.zLabel, Math.min(zLblScale,1.8)); lbZ.position.set(xMin-6.5,0.2,(zMin+zMax)/2); ag.add(lbZ);
  const lbY=makeSprite('Очки / час',1.04); lbY.position.set(xMin-5,6.5,zMax+0.5); ag.add(lbY);

  pivot.add(ag); axisGrp=ag;
}

function updateGradBar(mn,mx){
  const s=Array.from({length:11},(_,i)=>`hsl(${(1-i/10)*240},85%,52%)`);
  document.getElementById('gradBar').style.background=`linear-gradient(to right,${s.join(',')})`;
  document.getElementById('gradLabels').innerHTML=`<span>${Math.round(mn)}</span><span>${Math.round((mn+mx)/2)}</span><span>${Math.round(mx)} оч/ч</span>`;
}

buildBars();

// ── RESIZE ────────────────────────────────────────────────────
function onResize(){
  W=wrap.clientWidth; H=wrap.clientHeight;
  if(!W||!H) return;
  renderer.setSize(W,H); camera.aspect=W/H; camera.updateProjectionMatrix();
}
new ResizeObserver(onResize).observe(wrap);
requestAnimationFrame(onResize);

// ── CONTROLS ──────────────────────────────────────────────────
let isDrag=false, lastX=0, lastY=0, movedInDrag=false;
canvasEl.addEventListener('mousedown',e=>{isDrag=true;movedInDrag=false;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mouseup',()=>{isDrag=false;});
window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  if(Math.abs(dx)+Math.abs(dy)>2) movedInDrag=true;
  rotY+=dx*0.009; rotX+=dy*0.009;
  rotX=Math.max(-0.05,Math.min(1.3,rotX));
  lastX=e.clientX; lastY=e.clientY;
  pivot.rotation.y=rotY; pivot.rotation.x=rotX;
});
canvasEl.addEventListener('wheel',e=>{
  e.preventDefault();
  scl=Math.max(0.3,Math.min(3.2,scl*(1-e.deltaY*0.001)));
  pivot.scale.setScalar(scl);
},{passive:false});
canvasEl.addEventListener('touchstart',e=>{if(e.touches.length===1){isDrag=true;movedInDrag=false;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}},{passive:true});
canvasEl.addEventListener('touchend',()=>{isDrag=false;},{passive:true});
canvasEl.addEventListener('touchmove',e=>{
  if(!isDrag||e.touches.length!==1)return;
  const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
  if(Math.abs(dx)+Math.abs(dy)>2) movedInDrag=true;
  rotY+=dx*0.009; rotX+=dy*0.009;
  rotX=Math.max(-0.05,Math.min(1.3,rotX));
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  pivot.rotation.y=rotY; pivot.rotation.x=rotX;
},{passive:true});

// ── TOOLTIP ───────────────────────────────────────────────────
const tt=document.getElementById('tt');
const ttTitle=document.getElementById('ttTitle');
const ttBody=document.getElementById('ttBody');
const ttClose=document.getElementById('ttClose');
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let pinned=false;

function buildTTHTML(d){
  const ax=getAxes();
  const game=d.has ? ax.getGame(d.xi,d.zi) : null;
  const isMax=isLocalMaxX(d.xi,ax.xArr);

  let html=`<div class="tt-row">Ставка: <b>${d.rate} оч/ч</b></div>`;
  html+=`<div class="tt-row">Свежесть: <b>+${d.fresh}</b> · Рейтинг (${d.rLbl}): <b>+${d.rBonus}</b></div>`;
  html+=`<div class="tt-total">${d.s} оч/ч итого</div>`;
  if(isMax) html+=`<div class="tt-max">▲ локальный максимум</div>`;

  if(!d.has){
    html+=`<div class="tt-ghost">Нет игр в этой ячейке</div>`;
  } else {
    html+=`<div class="tt-sep">Пример игры:</div>`;
    if(game){
      html+=`<div class="tt-game"><a href="https://howlongtobeat.com/game/${game.id}" target="_blank">${game.name} ↗</a></div>`;
      html+=`<div class="tt-game-meta">HLTB: ~${game.hltb}ч · рейтинг: ${game.rating}%</div>`;
    } else {
      html+=`<div class="tt-nogame">Нет игры для текущего рейтинга</div>`;
    }
  }
  return html;
}

function placeTT(cx,cy){
  const rect=canvasEl.getBoundingClientRect();
  let lx=cx-rect.left+18, ly=cy-rect.top-80;
  ly=Math.max(4,Math.min(rect.height-220,ly));
  lx=Math.min(rect.width-254,Math.max(4,lx));
  tt.style.left=lx+'px'; tt.style.top=ly+'px';
}

function showTT(d,cx,cy,pin){
  // highlight selected bar
  if(selectedOutline){ pivot.remove(selectedOutline); selectedOutline=null; }
  if(pin||!pinned){
    const ht=d.ht||0.1;
    const BW2=BW+0.06;
    const outGeo=new THREE.BoxGeometry(BW2,ht+0.06,BW2);
    const edges=new THREE.EdgesGeometry(outGeo);
    const outMat=new THREE.LineBasicMaterial({color:0xffdd44,linewidth:2});
    selectedOutline=new THREE.LineSegments(edges,outMat);
    selectedOutline.position.set(d.x,ht/2,d.z);
    pivot.add(selectedOutline);
  }
  pinned=pin;
  tt.innerHTML=''; // reset
  // rebuild inner
  tt.innerHTML=`<div class="tt-head"><span class="tt-title">${d.ttLine1}</span><button class="tt-close" id="ttClose" style="display:${pin?'block':'none'}">✕</button></div><div id="ttBody">${buildTTHTML(d)}</div>`;
  tt.classList.toggle('pinned',pin);
  tt.style.display='block';
  placeTT(cx,cy);
  if(pin){
    document.getElementById('ttClose').addEventListener('click',()=>{
      pinned=false; tt.style.display='none'; tt.classList.remove('pinned'); if(selectedOutline){pivot.remove(selectedOutline);selectedOutline=null;}
    });
  }
}

function hitTest(){
  raycaster.setFromCamera(mouse,camera);
  return raycaster.intersectObjects([...barMeshes,...pyramidMeshes]);
}

canvasEl.addEventListener('mousemove',e=>{
  if(isDrag||pinned)return;
  const rect=canvasEl.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  const hits=hitTest();
  if(hits.length){showTT(hits[0].object.userData,e.clientX,e.clientY,false);}
  else{tt.style.display='none';}
});
canvasEl.addEventListener('mouseleave',()=>{if(!pinned)tt.style.display='none';});
canvasEl.addEventListener('click',e=>{
  if(movedInDrag)return;
  const rect=canvasEl.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  const hits=hitTest();
  if(hits.length){showTT(hits[0].object.userData,e.clientX,e.clientY,true);}
  else if(pinned){pinned=false;tt.style.display='none';tt.classList.remove('pinned');if(selectedOutline){pivot.remove(selectedOutline);selectedOutline=null;}}
});

// ── SLIDER / TOGGLE UI ────────────────────────────────────────
function updateSliderUI(){
  const sl=document.getElementById('sl');
  const lbl=document.getElementById('sliderLabel');
  const slVal=document.getElementById('slVal');
  const slDesc=document.getElementById('slDesc');
  if(axisMode==='year'){
    lbl.textContent='Год выхода';
    sl.min=1995; sl.max=2026; sl.step=1;
    if(sliderVal<1995||sliderVal>2026) sliderVal=2010;
    sl.value=sliderVal;
    slVal.textContent=String(sliderVal);
    slDesc.innerHTML=`Бонус свежести: <b>+${freshnessBonus(sliderVal)}</b>`;
  } else {
    lbl.textContent='Рейтинг HLTB';
    sl.min=0; sl.max=100; sl.step=1;
    if(sliderVal>100) sliderVal=75;
    sl.value=sliderVal;
    slVal.textContent=ratingLabel(sliderVal);
    slDesc.innerHTML=`Бонус: <b>+${ratingBonusFromPct(sliderVal)}</b> очка`;
  }
}

document.getElementById('sl').addEventListener('input',function(){
  sliderVal=parseInt(this.value);
  updateSliderUI();
  buildBars();
  if(pinned){pinned=false;tt.style.display='none';tt.classList.remove('pinned');}
});

document.getElementById('axisToggle').querySelectorAll('button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.getElementById('axisToggle').querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    axisMode=btn.dataset.axis;
    if(axisMode==='year'&&sliderVal>100) sliderVal=2010;
    if(axisMode!=='year'&&(sliderVal<0||sliderVal>100)) sliderVal=75;
    updateSliderUI();
    buildBars();
    pinned=false; tt.style.display='none'; tt.classList.remove('pinned'); if(selectedOutline){pivot.remove(selectedOutline);selectedOutline=null;}
  });
});

document.getElementById('darkToggle').addEventListener('change',function(){
  document.documentElement.setAttribute('data-theme',this.checked?'dark':'');
  buildBars();
});

        // ── RENDER LOOP ───────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
        // Тёмная тема по умолчанию
        document.getElementById('darkToggle').checked = true;
        updateSliderUI();
    </script>
